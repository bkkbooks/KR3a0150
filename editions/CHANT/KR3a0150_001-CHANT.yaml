body:
  text: 秦子欲顯白于雪中馳光于日下不可得也馬總意林卷五歐陽詢藝文類聚卷二顧彥先難云有味如醽而不醉人其味如黍飲之則醉何也秦子曰醉在小人不在君子吾欲錦中而紵表不欲繡外而麻裏猶論者寧匱于辭不匱于理意林卷五遠難知者天近難知者人意林卷五因斧以得柯因柯以成用種一粟則千萬之粟滋種一仁則眾行之美備矣鍼雖小入水則沈毛雖大入水則浮性自然也並同上有千金之裘而無千金之布北堂書鈔卷一百二十九今人知涉川必溺而忘酒醴之荒性北堂書鈔卷一百四十八秦子曰常問作人當如園圃之藍不異眾草染而後朗然不如唐棣之華灼灼自顯藝文類聚卷八十孔文舉為北海相有遭父喪哭泣墓側色無憔悴文舉殺之又有母病瘥思食新麥家無乃盜鄰熟麥而進之文舉聞之特賞曰無有來討勿復盜也盜而不罪者以為勤於母飢哭而見殺者以為形慈而心否藝文類聚卷八十五一人執規十手自員一人吹簫長短皆應太平御覽卷五百八十一五味者各稱一族之名合和一鼎名曰羹猶威重廉平恩合而為信也太平御覽卷八百六十一智惠多則引血氣如燈火消暗膏炷大而朗朗則膏消炷小而闇闇則息膏則久也太平御覽卷八百七十虎能雄猛不可以託麑鷹能飄擊不可以寄雛太平御覽卷九百六又卷九百二十六踰枳棘之籬則有絓柱之患登椒樹之圃則有榮華之芳太平御覽卷九百五十九食瓜者雖去蔕何以連其根太平御覽卷九百七十八玉壺必求其所以盛干將必求其所以斷文選鮑明遠白頭吟李善注無盛之卮雖赤瓊碧瓐無貴也不斷之劍雖含影承光無取也楊慎丹鉛總錄
